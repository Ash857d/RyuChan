<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyuChan 加密文章密码管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .copy-btn {
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.75rem;
            background-color: #e5e7eb;
            padding: 0.25rem 0.75rem;
            border-radius: 0.375rem;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        .copy-btn:hover {
            background-color: #3b82f6;
            color: white;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-50 p-4 md:p-6">
    <div class="max-w-6xl mx-auto">
        <div class="bg-gradient-to-r from-red-600 to-red-700 rounded-2xl shadow-xl mb-6 overflow-hidden">
            <div class="px-6 py-5">
                <h1 class="text-2xl md:text-3xl font-bold text-white">RyuChan 加密文章密码管理</h1>
                <p class="text-red-100 text-sm mt-1">🔐 实时从 GitHub 读取 | 自动更新</p>
            </div>
        </div>

        <div id="auth-panel" class="bg-white rounded-2xl shadow-xl p-6">
            <div class="bg-yellow-50 border-l-4 border-yellow-400 p-4 mb-6">
                <span class="text-yellow-800 text-sm">⚠️ 请输入管理员密码</span>
            </div>
            <div class="max-w-md mx-auto">
                <input type="password" id="admin-password" class="w-full border rounded-lg px-4 py-2 mb-4" placeholder="管理员密码" autofocus />
                <button id="verify-btn" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 rounded-lg">验证</button>
                <p id="error-msg" class="text-red-500 text-sm mt-2 hidden"></p>
            </div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <div class="flex justify-between items-center">
                    <div>
                        <span class="text-gray-500">加密文章总数：</span>
                        <span id="total-count" class="text-2xl font-bold text-red-600">0</span>
                    </div>
                    <button onclick="loadData()" class="bg-gray-100 px-3 py-1 rounded">🔄 刷新</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden">
                <table class="min-w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium">标题</th>
                            <th class="px-6 py-3 text-left text-xs font-medium">密码</th>
                            <th class="px-6 py-3 text-left text-xs font-medium">操作</th>
                        </tr>
                    </thead>
                    <tbody id="posts-table" class="divide-y divide-gray-200">
                        <tr><td colspan="3" class="px-6 py-8 text-center"><div class="loading mx-auto"></div><p class="mt-2">加载中...</p></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "ashjy123";
        const GITHUB_REPO = "Ash857d/RyuChan";
        
        // 尝试多个源
        const URLs = [
            `https://raw.githubusercontent.com/${GITHUB_REPO}/main/posts.json`,
            `https://cdn.jsdelivr.net/gh/${GITHUB_REPO}/posts.json`,
            `https://${GITHUB_REPO.split('/')[0]}.github.io/${GITHUB_REPO.split('/')[1]}/posts.json`
        ];
        
        let currentPosts = [];

        if (sessionStorage.getItem('verified') === 'true') {
            document.getElementById('auth-panel').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadData();
        }

        document.getElementById('verify-btn').onclick = () => {
            if (document.getElementById('admin-password').value === ADMIN_PASSWORD) {
                sessionStorage.setItem('verified', 'true');
                document.getElementById('auth-panel').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadData();
            } else {
                document.getElementById('error-msg').innerText = '密码错误';
                document.getElementById('error-msg').classList.remove('hidden');
            }
        };

        async function loadData() {
            document.getElementById('posts-table').innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center"><div class="loading mx-auto"></div><p>加载中...</p></td></tr>';
            
            for (const url of URLs) {
                try {
                    console.log('尝试加载:', url);
                    const res = await fetch(url + '?t=' + Date.now());
                    if (res.ok) {
                        const data = await res.json();
                        const posts = data.posts || data;
                        
                        if (posts && posts.length > 0) {
                            currentPosts = posts;
                            renderTable(posts);
                            document.getElementById('total-count').innerText = posts.length;
                            console.log('✅ 加载成功:', posts.length, '篇文章');
                            return;
                        }
                    }
                } catch(e) {
                    console.log('❌ 失败:', url);
                }
            }
            
            document.getElementById('posts-table').innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-red-500">加载失败，请检查 posts.json 是否存在</td></tr>';
        }

        function renderTable(posts) {
            let html = '';
            for (const post of posts) {
                const id = 'pwd_' + Math.random();
                html += `
                    <tr>
                        <td class="px-6 py-4">${escapeHtml(post.title)}</td>
                        <td class="px-6 py-4">
                            <span class="font-mono bg-gray-100 px-2 py-1 rounded" id="${id}">${'•'.repeat(post.password.length)}</span>
                        </td>
                        <td class="px-6 py-4">
                            <button onclick="togglePwd('${id}', '${escapeJs(post.password)}')" class="copy-btn">显示</button>
                            <button onclick="copyPwd('${escapeJs(post.title)}', '${escapeJs(post.password)}')" class="copy-btn ml-2">复制</button>
                        </td>
                    </tr>
                `;
            }
            document.getElementById('posts-table').innerHTML = html;
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function escapeJs(str) {
            return str.replace(/'/g, "\\'");
        }

        function togglePwd(id, pwd) {
            const el = document.getElementById(id);
            if (el.innerText === '•'.repeat(pwd.length)) {
                el.innerText = pwd;
            } else {
                el.innerText = '•'.repeat(pwd.length);
            }
        }

        function copyPwd(title, pwd) {
            navigator.clipboard.writeText(`【${title}】密码：${pwd}`);
            showToast(`已复制 ${title}`);
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast bg-green-500';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.loadData = loadData;
        window.togglePwd = togglePwd;
        window.copyPwd = copyPwd;
    </script>
</body>
</html>
