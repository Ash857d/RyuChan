name: 🔐 实时修改密码

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-password-update]
  schedule:
    - cron: '0 2,14 * * *'

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          npm init -y
          npm install glob gray-matter
      
      - name: 执行改密码脚本
        run: node scripts/update-passwords.js
      
      - name: 更新 posts.json
        run: |
          node -e "
          import fs from 'fs';
          import { glob } from 'glob';
          import matter from 'gray-matter';
          
          const posts = [];
          const files = await glob('src/content/blog/**/*.{md,mdx}');
          
          for (const file of files) {
              const content = fs.readFileSync(file, 'utf8');
              const { data } = matter(content);
              if (data.password) {
                  posts.push({
                      title: data.title || file.split('/').pop().replace(/\.(md|mdx)$/, ''),
                      slug: file.split('/').pop().replace(/\.(md|mdx)$/, ''),
                      password: data.password
                  });
              }
          }
          
          fs.writeFileSync('posts.json', JSON.stringify({
              lastUpdated: new Date().toISOString(),
              total: posts.length,
              posts: posts
          }, null, 2));
          "
      
      - name: 提交更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/blog/*.md posts.json
          if git diff --staged --quiet; then
            echo "没有变化，跳过提交"
          else
            git commit -m "🔄 实时修改密码 [skip ci]"
            git push
          fi
